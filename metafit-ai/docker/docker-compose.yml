version: '3.8'
services:
  php:
    build: ./docker
    volumes:
      - ./:/var/www/html
    ports:
      - '9000:9000'
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: metafit
    ports:
      - '3306:3306'
  nginx:
    image: nginx:stable
    ports:
      - '8080:80'
    volumes:
      - ./:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
