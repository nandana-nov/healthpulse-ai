<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MetaFit AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-glass">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">MetaFit AI</a>
    </div>
  </nav>

  <main class="container py-5">
    <section class="hero text-center">
      <h1 class="display-5">Personalized Health & Fitness with AI</h1>
      <p class="lead">BMI, Metabolism, Calorie needs, personalized diet & fitness plans.</p>
      <a class="btn btn-lg btn-primary" href="#dashboard">Get Started</a>
    </section>

    <section id="dashboard" class="mt-5">
      <div class="card shadow-sm glass-card">
        <div class="card-body">
          <h5 class="card-title">Dashboard (demo)</h5>
          <div id="charts" class="row">
            <canvas id="progressChart" width="400" height="200"></canvas>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
